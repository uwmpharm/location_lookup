<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacy Downtime Inventory Finder | UW Medicine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600&family=Source+Serif+4:wght@400;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --uw-purple: #32006e;
      --uw-purple-mid: #54348b;
      --uw-gold: #FFC700;
      --bg: #f5f3f8;
      --surface: #ffffff;
      --border: rgba(50,0,110,0.12);
      --text-primary: #1a0a2e;
      --text-secondary: #5a4a7a;
      --text-hint: #9685b4;
      --red: #d24310;
      --green: #0f6e56;
      --green-bg: #e1f5ee;
      --radius: 10px;
      --radius-lg: 14px;
    }

    body { font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text-primary); font-size: 15px; }

    .app { display: flex; flex-direction: column; min-height: 100vh; }

    .header { 
      background: var(--uw-purple); 
      color: white; 
      padding: 0 24px; 
      display: flex; 
      align-items: center; 
      justify-content: space-between; 
      height: 56px; 
      border-bottom: 3px solid var(--uw-gold); 
    }
    .header-brand { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-family: 'Source Serif 4', serif; font-size: 17px; font-weight: 600; color: white; }
    .header-logo span { color: var(--uw-gold); }
    
    .site-select-container { display: flex; align-items: center; gap: 10px; }
    .site-select { 
      background: rgba(255,255,255,0.12); 
      border: 1px solid var(--uw-gold); 
      color: white; 
      font-size: 14px; 
      font-weight: 600; 
      padding: 6px 12px; 
      border-radius: 6px; 
      cursor: pointer; 
    }
    .site-select option { background: var(--uw-purple); color: white; }

    .search-zone { background: var(--uw-purple); padding: 30px 24px; text-align: center; }
    .search-wrap { position: relative; max-width: 600px; margin: 0 auto; }
    .search-input { 
      width: 100%; 
      height: 50px; 
      padding: 0 20px; 
      border: 2px solid rgba(255,255,255,0.2); 
      border-radius: var(--radius); 
      background: rgba(255,255,255,0.08); 
      color: white; 
      font-size: 16px; 
      outline: none; 
      transition: all 0.2s;
    }
    .search-input:disabled { opacity: 0.4; cursor: not-allowed; background: rgba(0,0,0,0.1); }
    .search-input:focus:not(:disabled) { border-color: var(--uw-gold); background: rgba(255,255,255,0.15); }

    .main { flex: 1; padding: 24px; max-width: 800px; width: 100%; margin: 0 auto; }

    /* Result Cards */
    .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 12px; }
    .result-top { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .result-description { font-size: 16px; font-weight: 600; color: var(--uw-purple); }
    .tag { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; text-transform: uppercase; }
    .tag-inventory { background: var(--green-bg); color: var(--green); }
    .tag-forward { background: #fff7e0; color: #7a5200; }
    
    .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .field { background: var(--bg); padding: 8px; border-radius: 6px; }
    .label { font-size: 11px; color: var(--text-hint); font-weight: 600; text-transform: uppercase; }
    .value { font-size: 14px; font-weight: 600; }
    .mono { font-family: monospace; }

    .pyxis-row { margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); }
    .pyxis-pill { display: inline-block; background: var(--uw-purple-light); color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; margin-left: 5px; font-family: monospace;}

    .state-msg { text-align: center; padding: 40px; color: var(--text-secondary); }
    .spinner { width: 30px; height: 30px; border: 3px solid #ddd; border-top: 3px solid var(--uw-purple); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">UW <span>Medicine</span></div>
      <div class="header-divider"></div>
    </div>
    <div class="site-select-container">
      <span style="font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.7)">LOCATION:</span>
      <select class="site-select" id="siteSelect" onchange="onSiteChange()">
        <option value="">Select Location...</option>
        <option value="HMC-MAIN">Harborview</option>
        <option value="UWMC-MAIN">Montlake</option>
        <option value="NWH-MAIN">Northwest</option>
      </select>
    </div>
  </div>

  <div class="search-zone">
    <div class="search-wrap">
      <input class="search-input" id="searchInput" type="text" placeholder="Select a location first..." disabled oninput="onSearch()" />
    </div>
  </div>

  <div class="main" id="stateArea">
    <div class="state-msg">
      <h3>Welcome</h3>
      <p>Please select your hospital location in the header to begin searching.</p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const DEFAULT_URL = 'https://iynuqsbgnshlromwkzfl.supabase.co';
const DEFAULT_KEY = 'sb_publishable_qYy0w0btGs67ASUw8rIPug_Ken-W5AF';

let supabase = window.supabase.createClient(DEFAULT_URL, DEFAULT_KEY);
let currentSite = localStorage.getItem('pdif_site') || '';
let searchTimer = null;

function init() {
  const siteSelect = document.getElementById('siteSelect');
  const searchInput = document.getElementById('searchInput');

  if (currentSite) {
    siteSelect.value = currentSite;
    searchInput.disabled = false;
    searchInput.placeholder = "Search inventory...";
    renderIdle();
  }
}

function onSiteChange() {
  const siteSelect = document.getElementById('siteSelect');
  const searchInput = document.getElementById('searchInput');
  
  currentSite = siteSelect.value.trim();
  localStorage.setItem('pdif_site', currentSite);

  if (currentSite) {
    searchInput.disabled = false;
    searchInput.placeholder = "Search inventory...";
    searchInput.focus();
    renderIdle();
  } else {
    searchInput.disabled = true;
    searchInput.placeholder = "Select a location first...";
    searchInput.value = "";
    renderWelcome();
  }
}

function onSearch() {
  clearTimeout(searchTimer);
  const q = document.getElementById('searchInput').value.trim();
  if (q.length < 2) { renderIdle(); return; }
  searchTimer = setTimeout(() => doSearch(q), 200);
}

async function doSearch(q) {
  // CRITICAL CHECK - Diagnostic for space/length issues
  console.log("CRITICAL CHECK - Site String: '" + currentSite + "' (Length: " + currentSite.length + ")");

  renderState('<div class="spinner"></div>');

  try {
    const { data, error } = await supabase
      .from('downtime_inventory_finder')
      .select('*')
      .eq('pharmacy', currentSite)
      .or(`item_description.ilike.%${q}%,item.eq.${q},pyxis_id.eq.${q.toUpperCase()}`)
      .limit(50);

    if (error) throw error;

    if (!data || data.length === 0) {
      renderState(`<div class="state-msg"><h3>No Results</h3><p>No matches found for "${q}" at ${getSiteLabel(currentSite)}.</p></div>`);
      return;
    }

    renderResults(data, q);
  } catch (e) {
    renderState(`<div class="state-msg"><h3 style="color:red">Error</h3><p>${e.message}</p></div>`);
  }
}

function renderResults(items, q) {
  let html = `<div style="margin-bottom:15px; font-size:13px; color:var(--text-secondary)">Showing ${items.length} results for "<strong>${q}</strong>"</div>`;

  items.forEach(r => {
    const isInv = r.location_type === 'Inventory';
    const tagClass = isInv ? 'tag-inventory' : 'tag-forward';
    const tagLabel = isInv ? 'In Stock' : 'Forward Pick';
    const qtyText = (r.quantity === null) ? '0' : r.quantity;
    const qtyClass = parseFloat(qtyText) <= 0 ? 'color:var(--red)' : 'color:var(--green)';

    html += `
    <div class="result-card">
      <div class="result-top">
        <div class="result-description">${r.item_description || 'Unknown Item'}</div>
        <span class="tag ${tagClass}">${tagLabel}</span>
      </div>
      <div class="result-grid">
        <div class="field">
          <div class="label">Location</div>
          <div class="value mono">${r.location || '—'}</div>
        </div>
        <div class="field">
          <div class="label">Quantity</div>
          <div class="value" style="${qtyClass}">${qtyText} <small style="color:var(--text-hint)">${r.uom || ''}</small></div>
        </div>
        <div class="field">
          <div class="label">Item ID</div>
          <div class="value mono">${r.item}</div>
        </div>
      </div>
      ${r.pyxis_id ? `<div class="pyxis-row"><span class="label">Pyxis ID:</span><span class="pyxis-pill">${r.pyxis_id}</span></div>` : ''}
    </div>`;
  });
  renderState(html);
}

function getSiteLabel(val) {
  const map = { 'HMC-MAIN': 'Harborview', 'UWMC-MAIN': 'Montlake', 'NWH-MAIN': 'Northwest' };
  return map[val] || val;
}

function renderIdle() {
  renderState('<div class="state-msg"><h3>Ready to Search</h3><p>Enter an item description, ID, or Pyxis label.</p></div>');
}

function renderWelcome() {
  renderState('<div class="state-msg"><h3>Welcome</h3><p>Please select your hospital location in the header to begin searching.</p></div>');
}

function renderState(html) { document.getElementById('stateArea').innerHTML = html; }

init();
</script>
</body>
</html>
